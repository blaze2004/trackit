<!DOCTYPE html>
<html lang="en">

<head>
    {% block title %}
    <title>Meet Attendance Collector</title>{% endblock %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">

    <!-- Add additional CSS in static file -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/base_generic.css' %}">
    <link rel="icon" type="image/png" href="{% static 'images/mac-logo.png' %}">

    <!-- Add additional JS in static file -->
    <script defer src="{% static 'js/base_generic.js' %}"></script>
    {% block stylesheet %} {% endblock %}
</head>

<body>

    <header>

        <div class="container">
            <a href="/" class="logo"><img src="{% static 'images/mac-logo.png' %}" alt="" width="70" height="76" /></a>
            <nav>
                {% load socialaccount %} {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" tyle="background: transparent;outline: none;border: none; "><img src="{{ user.socialaccount_set.all.0.get_avatar_url }} " alt="profile " width="54 " height="54 " /></a>
                <a id="user_id" style="display: none;">{{ user.id }}</a> {% else %}
                <a id="user_id" style="display: none;">-1</a>
                <a href="{% provider_login_url 'google' %} " class="nav-link ">Signup</a>
                <a href="{% provider_login_url 'google' %} " class="nav-link ">Login</a> {% endif %}
            </nav>

        </div>

    </header>

    {% block content %}{% endblock %}

</body>

</html>
